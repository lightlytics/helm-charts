{{- if and (.Values.streamsec.cluster_agent_containers.enabled) (.Values.streamsec.runtime_agent.enabled) }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ template "streamsec.fullname" . }}-runtime-agent
  labels:
  {{- include "streamsec.labels" . | nindent 4 }}
  annotations:
    {{- if not .Values.streamsec.apiTokenExistingSecret }}
      checksum/api-token: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    {{- end }}
spec:
  selector:
    matchLabels:
  {{- include "streamsec.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
    {{- include "streamsec.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.streamsec.runtime_agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamsec.runtime_agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamsec.runtime_agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runtime-agent
          image: {{ include "streamsec.runtime-agent-image-path" $ }}
          imagePullPolicy: {{ .Values.streamsec.runtime_agent.image.pullPolicy }}
          {{- with .Values.streamsec.runtime_agent.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.streamsec.runtime_agent.responseActionsEnabled }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: EVENTS_FILENAME
              value: {{ .Values.streamsec.runtime_agent.tetragonFilePath }}{{ .Values.streamsec.runtime_agent.tetragonFileName }}
            - name: API_URL
              value: {{ .Values.streamsec.apiUrl | quote }}
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ template "streamsec.apiTokenSecretName" $ }}
                  key: api-key
            {{- if .Values.streamsec.env.CLUSTER_ID }}
            - name: CLUSTER_ID
              value: {{ .Values.streamsec.env.CLUSTER_ID | quote }}
            {{- end }}
            {{- if .Values.streamsec.env.CLUSTER_NAME }}
            - name: CLUSTER_NAME
              value: {{ .Values.streamsec.env.CLUSTER_NAME | quote }}
            {{- end }}
            {{- if .Values.streamsec.env.ACCOUNT_ID }}
            - name: ACCOUNT_ID
              value: {{ .Values.streamsec.env.ACCOUNT_ID | quote }}
            {{- end }}
            {{- if .Values.streamsec.env.REGION }}
            - name: REGION
              value: {{ .Values.streamsec.env.REGION | quote }}
            {{- end }}
            {{- if .Values.streamsec.env.RESOURCE_GROUP }}
            - name: RESOURCE_GROUP
              value: {{ .Values.streamsec.env.RESOURCE_GROUP | quote }}
            {{- end }}
            {{- if .Values.streamsec.runtime_agent.responseActionsEnabled }}
            - name: RESPONSE_ACTIONS_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.streamsec.env.AI_BODY_ENABLED }}
            - name: AI_BODY_ENABLED
              value: {{ .Values.streamsec.env.AI_BODY_ENABLED | quote }}
            {{- end }}
            {{- if .Values.streamsec.env.EXTERNAL_INBOUND_BODY_ENABLED }}
            - name: EXTERNAL_INBOUND_BODY_ENABLED
              value: {{ .Values.streamsec.env.EXTERNAL_INBOUND_BODY_ENABLED | quote }}
            {{- end }}
          securityContext:
            privileged: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - mountPath: /sys/kernel
              name: sys-kernel
            - mountPath: {{ .Values.streamsec.runtime_agent.tetragonFilePath }}
              name: export-logs
            - mountPath: /host/proc
              name: proc
            {{- if .Values.streamsec.runtime_agent.responseActionsEnabled }}
            - mountPath: /run/containerd/containerd.sock
              name: containerd-sock
            {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      hostNetwork: true
      hostPID: true
      hostIPC: true
      {{- $priorityClassName := default (include "streamsec.priorityClassName" .) .Values.streamsec.runtime_agent.priorityClassName }}
      {{- if $priorityClassName }}
      priorityClassName: {{ $priorityClassName | quote }}
      {{- end }}
      serviceAccountName: {{ template "streamsec.serviceAccountName" . }}
      terminationGracePeriodSeconds: 1
      volumes:
        - hostPath:
            path: {{ .Values.streamsec.runtime_agent.tetragonFilePath }}
            type: DirectoryOrCreate
          name: export-logs
        - hostPath:
            path: /sys/kernel
            type: DirectoryOrCreate
          name: sys-kernel
        - hostPath:
            path: /proc
            type: DirectoryOrCreate
          name: proc
        {{- if .Values.streamsec.runtime_agent.responseActionsEnabled }}
        - hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
          name: containerd-sock
        {{- end }}
  {{- with .Values.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}