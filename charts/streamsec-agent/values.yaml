## Default values for Stream Security agent
## See Stream Security helm documentation:


nameOverride:  # ""

fullnameOverride:  # ""

registry: public.ecr.aws/stream-security

dnsPolicy: Default

streamsec:
  #streamsec.apiToken --  Stream Security API token for your Kubernetes cluster
  #Required: Set your Stream Security API token here
  #ref :
  apiToken:

  # streamsec.apiTokenExistingSecret -- Use existing Secret which stores API key instead of creating a new one. The value should be set with the `api-key` key inside the secret.
  ## If set, this parameter takes precedence over "apiToken".
  apiTokenExistingSecret:  # <API_TOKEN_SECRET>

  #streamsec.apiUrl -- Stream Security site url
  #Required: Set your Stream Security API URL here
  apiUrl:

  #streamsec.fullScanScheduleSeconds -- periodic Kubernetes resources scan at seconds
  fullScanScheduleSeconds: 1800

  #streamsec.filterRunningPods -- takes only pods which at status running
  filterRunningPods: true

  #streamsec.fieldSelectorsNamespaces -- filter/unfilter resources from specific namespace
  fieldSelectorsNamespaces:

  #streamsec.fieldSelectorsNames
  fieldSelectorsNames:

  #streamsec.inLabelSelector
  inLabelSelector:

  #streamsec.nodeSelector
  nodeSelector: {}
  # Example:
  # nodeSelector:
  #   node.kubernetes.io/instance-type: m5.large
  #streamsec.affinity
  affinity: {}
  # Example:
  # affinity:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #          - matchExpressions:
  #            - key: eks.amazonaws.com/compute-type
  #              operator: NotIn
  #              values: ["fargate"]

  #streamsec.dnsConfig
  dnsConfig: {}
    # options:
    # - name: ndots
    #   value: "2"
  #streamsec.tolerations
  tolerations:
  - key: re
    operator: Equal
    value: 'true'
    effect: NoSchedule

  #streamsec.existLabelSelector
  existLabelSelector:

  #streamsec.equalsLabelSelector
  equalsLabelSelector:
  #streamsec.workflow -- streamsec workflow type 
  workflow: full_scan

  #streamsec.port -- streamsec port
  port: 443

  replicas: 1

  # priorityClass -- Dedicated PriorityClass for the node-agent DaemonSets (runtime-agent and
  # process-discovery). Without it these pods run at priority 0 and can be left Pending on a
  # fully-packed node (they target one existing node and cannot move elsewhere), leaving that
  # node with no runtime security agent. See DEV-20663.
  #
  # NOTE: PriorityClass is a CLUSTER-SCOPED resource. Rendering it (create: true) requires the
  # Helm installer's credentials to have create permission on scheduling.k8s.io/priorityclasses
  # (cluster-admin does). It is created at install time by Helm, NOT by the agent's runtime
  # ServiceAccount, so no addition to the agent ClusterRole is required. If your install path
  # cannot create cluster-scoped objects, either pre-create the PriorityClass out of band and set
  # create: false (the DaemonSets will reference it by `name`), or leave enabled: false.
  priorityClass:
    # streamsec.priorityClass.enabled -- Master switch. When true, the node-agent DaemonSets get
    # priorityClassName set. Default false for a staged rollout (enable on your own clusters /
    # a demo env first, then customers) because preemption is a behavior change (see below).
    enabled: false

    # streamsec.priorityClass.create -- Render the PriorityClass object with the chart. Set false
    # to reference an externally pre-created class of the same `name` (e.g. when the installer
    # lacks RBAC to create cluster-scoped resources). Only takes effect when enabled: true.
    create: true

    # streamsec.priorityClass.name -- Name of the PriorityClass, used both for the created object
    # and the priorityClassName reference on the DaemonSets.
    name: streamsec-agent-critical

    # streamsec.priorityClass.value -- Priority value. Must be >> 0 (the default for unclassed
    # pods) and < system-cluster-critical (2000000000). Immutable after creation.
    value: 1000000000

    # streamsec.priorityClass.preemptionPolicy -- PreemptLowerPriority lets the agent EVICT a
    # priority-0 workload pod to fit on a full node (required here: a DaemonSet can't relocate;
    # the evicted pod reschedules elsewhere / triggers cluster autoscaling, or waits for capacity
    # on clusters without an autoscaler). Set to Never for schedule-only (no eviction; the agent
    # may stay Pending on packed nodes).
    preemptionPolicy: PreemptLowerPriority

    # streamsec.priorityClass.description -- Human-readable description on the PriorityClass object.
    description: "StreamSec node agents - must run on every node."

  # podSecurityContext -- Security context applied at the pod level for all non-privileged workloads
  # (cluster_agent, cost, process_discovery). Override in your values to adjust for your PSP/PSS policies.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 2000
    supplementalGroups: [1000]
    seccompProfile:
      type: RuntimeDefault

  image:
    #streamsec.image.name -- Stream Security agent image name.
    name: cluster-agent

    #streamsec.image.tag -- Stream Security agent tag to use.
    tag: 1.2.10

    #streamsec.image.digest -- Stream Security agent image digest to use.
    digest: sha256:6b5021f226cc7dd217615a0715790b4b00515d6fd162ec6790d2956410b84f93

    #streamsec.image.pullPolicy -- Stream Security agent image pullPolicy
    pullPolicy: IfNotPresent


  cost_image:
    #streamsec.cost_image.name -- Stream Security cost agent image name.
    name: cluster-agent

    #streamsec.cost_image.tag -- Stream Security cost agent tag to use.
    tag: 1.2.10

    #streamsec.cost_image.digest -- Stream Security cost agent image digest to use.
    digest: sha256:6b5021f226cc7dd217615a0715790b4b00515d6fd162ec6790d2956410b84f93

    #streamsec.cost_image.pullPolicy -- Stream Security cost agent image pullPolicy
    pullPolicy: IfNotPresent

  process_discovery_image:
    #streamsec.process_discovery_image.name -- Stream Security process discovery agent image name.
    name: process-agent

    #streamsec.process_discovery_image.tag -- Stream Security process discovery agent tag to use.
    tag: master.75

    #streamsec.process_discovery_image.pullPolicy -- Stream Security process discovery agent image pullPolicy
    pullPolicy: IfNotPresent

  serviceAccount:
    #streamsec.serviceAccount.create
    create: true

    #streamsec.serviceAccount.name -- The name of the Service account.
    #If not set and create is true, a name is generated using the fullname template
    name: ''

  clusterRole:
    #streamsec.clustRole.create
    create: true
    #streamsec.serviceAccount.name -- The name of the Service account.
    #If not set and create is true, a name is generated using the fullname template
    name: ''

  cost_containers:
    #streamsec.cost_containers.enabled
    enabled: false
    containers:
      connector:
        name: connector
        command:
        - /usr/local/bin/python
        - main.py
        - connector
        resources:
          requests:
            cpu: 800m
            memory: 1024Mi
          limits:
            cpu: 2000m
            memory: 2048Mi
      cost:
        name: cost
        command:
        - /usr/local/bin/python
        - main.py
        - cost
        resources:
          requests:
            cpu: 800m
            memory: 1024Mi
          limits:
            cpu: 2000m
            memory: 2048Mi


  cluster_agent_containers:
    enabled: true
    containers:
      krs:
        enabled: true
        name: krs
        command:
        - /usr/local/bin/python
        - main.py
        - krs
        resources:
          requests:
            cpu: 1000m
            memory: 2048Mi
          limits:
            cpu: 2000m
            memory: 4096Mi
      sbom:
        enabled: false
        name: sbom
        command:
        - /usr/local/bin/python
        - main.py
        - sbom
        resources:
          requests:
            cpu: 1000m
            memory: 2048Mi
          limits:
            cpu: 2000m
            memory: 4096Mi
      events:
        enabled: true
        name: events
        command:
        - /usr/local/bin/python
        - main.py
        - events
        resources: {}
      network-policy:
        enabled: false
        name: network-policy
        command:
        - /usr/local/bin/python
        - main.py
        - network_policy
        resources: {}
      tracing-policy:
        name: tracing-policy
        command:
        - /usr/local/bin/python
        - main.py
        - tracing_policy
        resources: {}

    dockerConfigSecret:
      enabled: false                # Set to true to mount secret to sbom container
      name: regcred

  process_discovery_containers:
    enabled: false
    containers:
      process-discovery:
        name: process-discovery
        resources: {}

  runtime_agent:
    enabled: false
    tetragonFilePath: /var/run/cilium/tetragon/
    tetragonFileName: tetragon.log
    nodeSelector: {}
    tolerations:
    - operator: Exists
    affinity: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    updateStrategy: {}
    image:
      name: runtime-agent
      tag: 1.5.2
      digest: sha256:cbf3701852b99f919d662f66f32afb792073b553c078e7cc71e44c635283d1d5
      pullPolicy: IfNotPresent

  env:
    LOGLEVEL: INFO
    DEBUG: 'false'
    CLUSTER_ID:  # "" 
    CLUSTER_NAME:  # "" 
    ACCOUNT_ID:  # "" 
    REGION:  # "" 
    RESOURCE_GROUP:  # ""
    AI_BODY_ENABLED:  # ""
    EXTERNAL_INBOUND_BODY_ENABLED:  # ""

tetragon:
  # tetragon.priorityClassName -- PriorityClass for the Tetragon sensor DaemonSet (the ~200m
  # node agent that runtime-agent reads from). It has the same "priority 0, can't reschedule"
  # exposure as the StreamSec DaemonSets (DEV-20663), so when enabling streamsec.priorityClass
  # set this to the SAME class name (default: streamsec-agent-critical). Left empty by default.
  # NOTE: Tetragon is a subchart and cannot read streamsec.priorityClass.enabled, so this must be
  # set explicitly alongside it (both are typically set together in your per-install values overlay).
  priorityClassName: ""
  serviceAccount:
    name: tetragon
  export:
    mode: ''
  tetragonOperator:
    tolerations: []
  tetragon:
    grpc:
      address: localhost:59751
    resources:
      requests:
        cpu: 200m
        memory: 400Mi
    healthGrpc:
      port: 9763
    extraArgs:
      enable-ancestors: base
      enable-process-cred: true
    exportFileMaxSizeMB: 50
    exportDenyList: |-
      {"event_set": ["PROCESS_EXIT"]}
    fieldFilters: |
      {"event_set":["PROCESS_KPROBE"], "fields":"parent", "action":"EXCLUDE"}
      {"event_set":["PROCESS_KPROBE","PROCESS_EXEC"],"fields":"process.parent_exec_id,parent.parent_exec_id,ancestors.parent_exec_id,parent.cwd,ancestors.exec_id", "action":"EXCLUDE"}
      {"event_set":["PROCESS_EXEC"],"fields":"process.cap,parent.cap,parent.process_credentials,ancestors.cap,ancestors.process_credentials", "action":"EXCLUDE"}
